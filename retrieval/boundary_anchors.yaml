- card_text: "May 28, 2022 at 10:10 PM The entire handling of the covid-19 pandemic by our government left me heartbroken. My young children being forced to wear masks and being told they could seriously injure or kill their grandparents for going around them- what are the long term effects going to be on them for carrying a burden like that? I also don't appreciate how coerced I was into taking a vaccine while pregnant that I was very skeptical about. How dare doctors and officials tell pregnant mothers this vaccine is safe and effective during pregnancy and breastfeeding when the released Pfizer documents show this wasn't tested. Many small businesses have had to shut down while large corporations thrive. It is awful and shameful. Canada did NOT manage this pandemic well whatsoever. Locking people down and telling people they can't visit loved ones is cruel and it is inhumane. The government does not have any authority to do that to its people. I expect so much better and I am so horrified at how this was handled."
  label: other_none
  note: "public_health vs other_none — generic infrastructure brief"
