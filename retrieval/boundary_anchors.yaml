- card_text: "May 5th 2023 Atention: Luc Theriault,Member of the Parliament for Montcalm and Vice Chair of the Health Commitee. This information is my personal experience with breast implants and I would like to submit this information before you speak on your commitee’s study called: OVERSIGHT OF MEDICAL DEVICES (Breast Implants). I received smooth Mentor 225 cc implants filled with saline to 250cc and told that saline was very safe and they could last a lifetime even though they are only under warranty for 10 years. I later read on Dr.Stuart’s report Jan.3rd 1996 that the saline solution also contained 2.5 mgm. Of Solu-medrol per 100cc , and Kefzol 500 mgm. These were added to help stop the growth of bacteria, anti inflammatory to help prevent capsular contraction ,this also caused the inside contents of implants to become dark brown colour like steeped tea instead of clear. They were presented to me to see aŌer the explant they were inside plastic clear bags and one looked smaller than the other to me. I was not allowed to have them back as the director of the clinic has deemed them to be bio-hazardous material that needs to be disposed of properly. It seems rather ludicris that women can carry a hazardous implant on her chest for so many years and it be so close to her vital organs like heart, lungs, and rib cage. I never knew that our bodies will make a complete capsule over the implant in an effort to protect"
  label: womens_health
  note: "womens_health vs pharmacare — reproductive contraception brief"
- card_text: "OVERSIGHT OF MEDICAL DEVICES (BREAST IMPLANTS) Brief to the Standing Committee on Health As a Canadian citizen, I am demanding that Health Canada assume responsibility for establishing a registry of medical implants (breast implants) that could be used to track patients down and notify them immediately in the event of a recall. My name is Isabelle Lavoie, and I am a retired member of the Canadian Armed Forces. I am 43 years old. I received breast implants in December 2007 at age 28. The surgery was performed by Dr. Céline Roberge in Quebec City. I received Mentor’s 350 cc smooth saline-filled breast implants with identification number 350-1650 (see email attachment for identification card). My symptoms started in 2009. Please refer to Appendix A for a list of the symptoms that developed over the years. In 2016, my health declined and I was told several times that I was depressed. I took all the medication that I was prescribed and did all the recommended therapies. I had to ask to have my depression viewed as a symptom, rather than the cause of all my physical ailments. My doctor agreed to refer me to a surgeon because I suspected that my implants could be the underlying cause. The surgeon told me that that was impossible. I told him that I still wanted him to remove my implants. I had had my implants for nine years. Much to my surprise, I not only learned that the implants were still in my body, but"
  label: womens_health
  note: "womens_health vs pharmacare — reproductive contraception brief"